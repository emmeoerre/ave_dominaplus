rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration does not register custom service actions.
  appropriate-polling:
    status: exempt
    comment: The integration is push-based and does not poll.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: todo
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The integration does not register custom service actions.
  docs-triggers:
    status: exempt
    comment: The integration does not register custom automation triggers.
  docs-conditions:
    status: exempt
    comment: The integration does not register custom automation conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: todo
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: The integration does not register custom service actions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: The integration does not use authentication.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info: done
  discovery: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: done
  repair-issues: todo
  stale-devices: done

  # Platinum
  async-dependency:
    status: exempt
    comment: The integration has no external client dependency and all device I/O is asynchronous.
  inject-websession: done
  strict-typing: todo
